<!DOCTYPE html>
<html>
<head>
    <title>Edit Posting – {{ posting.title }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 10px; padding: 28px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        h1 { font-size: 1.3rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 4px; font-size: .85rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: .9rem; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .form-check { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
        .form-check input { width: auto; }
        .btn { display: inline-block; padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; text-decoration: none; color: #fff; }
        .btn-primary { background: #0d6efd; }
        .btn-primary:hover { background: #0b5ed7; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Edit Posting</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" value="{{ posting.title }}" required>
        </div>
        <div class="form-group">
            <label>Company *</label>
            <input type="text" name="company" value="{{ posting.company }}" required>
        </div>
        <div class="form-group">
            <label>URL</label>
            <input type="url" name="url" value="{{ posting.url|default:'' }}">
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" value="{{ posting.location|default:'' }}">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Min Salary</label>
                <input type="number" name="min_salary" value="{{ posting.min_salary|default:'' }}">
            </div>
            <div class="form-group">
                <label>Max Salary</label>
                <input type="number" name="max_salary" value="{{ posting.max_salary|default:'' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Commute (minutes)</label>
            <input type="number" name="distance_from_home" step="1" value="{{ posting.distance_from_home|default:'' }}">
        </div>
        <div class="form-check">
            <input type="checkbox" name="is_remote_only" id="remote" {% if posting.is_remote_only %}checked{% endif %}>
            <label for="remote">Remote only</label>
        </div>
        <div class="form-check">
            <input type="checkbox" name="is_in_office_only" id="office" {% if posting.is_in_office_only %}checked{% endif %}>
            <label for="office">In-office only</label>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description">{{ posting.description|default:'' }}</textarea>
        </div>
        <div class="form-actions">
            <a class="btn btn-secondary" href="/job_hunt/?hunt={{ posting.job_hunt_id }}">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </form>
</div>
</body>
</html>
